name: Update Minecraft versions

on:
  schedule:
    - cron: 0 0 * * *
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # ratchet:actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # ratchet:pnpm/action-setup@v6
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # ratchet:actions/setup-node@v7.0.0
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update Minecraft versions
        run: node scripts/updateVersions.js

      - name: Create pull request
        id: pull-request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # ratchet:peter-evans/create-pull-request@v8.1.1
        with:
          branch: github-actions/update-versions
          title: "chore: update Minecraft versions"
          body: ""
          commit-message: "chore: update Minecraft versions"
          reviewers: ryanccn
          sign-commits: true
          delete-branch: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Enable auto-merge
        run: gh pr merge --auto --squash "$PULL_REQUEST_URL"
        if: ${{ steps.pull-request.outputs.pull-request-url }}
        env:
          PULL_REQUEST_URL: ${{ steps.pull-request.outputs.pull-request-url }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
