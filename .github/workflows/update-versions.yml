name: Update Minecraft versions

on:
  schedule:
    - cron: 0 0 * * *
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub App token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # ratchet:actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # ratchet:actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@08c4be7e2e672a47d11bd04269e27e5f3e8529cb # ratchet:pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # ratchet:actions/setup-node@v6.3.0
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update Minecraft versions
        run: node scripts/updateVersions.js

      - name: Create pull request
        id: pull-request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # ratchet:peter-evans/create-pull-request@v8.1.1
        with:
          branch: github-actions/update-versions
          title: "chore: update Minecraft versions"
          body: ""
          commit-message: "chore: update Minecraft versions"
          reviewers: ryanccn
          sign-commits: true
          delete-branch: true
          token: ${{ steps.app-token.outputs.token }}

      - name: Enable auto-merge
        run: gh pr merge --auto --squash "$PULL_REQUEST_URL"
        if: ${{ steps.pull-request.outputs.pull-request-url }}
        env:
          PULL_REQUEST_URL: ${{ steps.pull-request.outputs.pull-request-url }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
